name: Deploy to here.now

on:
  schedule:
    - cron: '15 0 * * *'
  push:
    branches:
      - master
    paths:
      - 'index.html'
      - 'full-quotes.html'
      - 'assets/**'
      - 'docs/**'
      - 'scripts/build-site.php'
      - '.github/scripts/deploy-herenow.mjs'
      - '.github/workflows/deploy-herenow.yml'
  workflow_run:
    workflows: ["Update Quote of the Day"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "herenow"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build clean static site
        run: php scripts/build-site.php _site

      - name: Deploy persistent here.now site
        id: herenow
        run: node .github/scripts/deploy-herenow.mjs _site
        env:
          HERENOW_API_KEY: ${{ secrets.HERENOW_API_KEY }}
          HERENOW_SLUG: ${{ vars.HERENOW_SLUG }}

      - name: Update production URL in README
        if: steps.herenow.outputs.site_url != ''
        env:
          SITE_URL: ${{ steps.herenow.outputs.site_url }}
        run: |
          python3 .github/scripts/update-readme-url.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: update here.now production URL [skip ci]"
            git push
          fi

      - name: Update repository description
        if: steps.herenow.outputs.site_url != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: ${{ steps.herenow.outputs.site_url }}
        run: |
          gh api repos/${{ github.repository }} \
            --method PATCH \
            -f description="مقولات من خيرة العرب — ${SITE_URL}"
