name: Deploy to here.now

on:
  push:
    branches:
      - master
    paths:
      - 'index.html'
      - 'full-quotes.html'
      - 'assets/**'
      - 'docs/**'
      - 'scripts/build-site.php'
      - '.github/scripts/deploy-herenow.mjs'
      - '.github/workflows/deploy-herenow.yml'
  workflow_run:
    workflows: ["Update Quote of the Day"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "herenow"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build clean static site
        run: php scripts/build-site.php _site

      - name: Deploy persistent here.now site
        id: herenow
        run: node .github/scripts/deploy-herenow.mjs _site
        env:
          HERENOW_API_KEY: ${{ secrets.HERENOW_API_KEY }}
          HERENOW_SLUG: ${{ vars.HERENOW_SLUG }}
