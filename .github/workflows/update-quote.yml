name: Update Quote of the Day

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  update-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3

      - name: Update quote
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la | head -20
          echo ""
          echo "Database file check:"
          ls -la assets/QuotesDB.db
          echo ""
          php .github/scripts/update-quote.php

      - name: Export quotes to JSON
        run: php -r "require 'inc/db-utils.php'; exportQuotesToJson();"

      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Add files that should be committed
          git add index.html assets/QuotesDB.db assets/quotes.json
          
          # Add README.md only if it exists
          if [ -f README.md ]; then
            git add README.md
          fi
          
          # Add DEPLOYMENT.log only if it exists
          if [ -f assets/DEPLOYMENT.log ]; then
            git add assets/DEPLOYMENT.log
          fi
          
          # Commit only if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Update quote of the day"
          git push
