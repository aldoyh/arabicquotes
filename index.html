        .dark .quote-card {

            background-image: linear-gradient(135deg, rgba(45, 35, 25, 0.85), rgba(35, 25, 15, 0.95));
            border-color: rgba(180, 140, 100, 0.25);
        }
        
        .dark .quote-card::before {
            color: rgba(180, 140, 60, 0.06);

        .dark .quote-card:hover {

</head>

            <!-- Header -->
            <header class="relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-amber-600/90 to-amber-700/90 dark:from-amber-800/90 dark:to-amber-900/90"></div>
                <div class="relative z-10 py-8 px-6 md:px-8">
                    <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold text-white text-center page-title mb-2">ما قيل من خيرة العرب</h1>
                    <p class="text-amber-100/80 text-center text-sm md:text-base">مجموعة من أجمل الأقوال المأثورة والحكم العربية</p>
                </div>
            </header>
            
            <!-- Quote section -->

                <h2 class="text-2xl font-bold text-center mb-8 text-amber-800 dark:text-amber-300 page-title">اقتباس اليوم:</h2>
                
                <div id="quote-container">
        <div class="flex flex-col items-center animate-slide-up">
            <div class="w-full max-w-2xl quote-card rounded-xl p-8 mb-6 border-r-4 border-amber-500 dark:border-amber-600">
                <div class="text-3xl font-bold text-gray-800 dark:text-amber-50 mb-6 text-center leading-relaxed quote-text">
                    من يقتر على نفسه يكدس الثروة لغيره
                </div>
                <div class="text-xl font-semibold text-amber-700 dark:text-amber-300 text-center author-text">
                    — البخل

            </div>
            <div class="text-sm text-gray-500 dark:text-gray-400 italic">
                <p>اليوم: Wednesday 21st of January 2026 - 15:08 🎯 المشاهدات: 0</p>
            </div>
         </div></div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->

            <div class="container mx-auto px-4 max-w-5xl">
                <div class="flex flex-col items-center">
                    <div class="text-sm text-amber-800 dark:text-amber-400 mb-4">
                        <p class="text-center">مقولات من خيرة العرب © 2025</p>

                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path>

                    </div>
                </div>
            </div>
        </footer>
    </div>
    
    <script>
        // Theme toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        themeToggle.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
        });
    </script>

</html>
